<div class="bg-white/10 p-1 rounded-2xl max-w-6xl mx-auto backdrop-blur-sm border border-white/10">
  <div class="bg-slate-800 p-6 sm:p-8 rounded-xl">

    <!-- Configuration -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-x-8 gap-y-6 items-start">
      <div>
        <h3 class="text-lg font-semibold text-purple-300 mb-2">AI Provider</h3>
        <select
          [value]="provider()"
          (change)="providerChange.emit($any($event.target).value)"
          class="w-full p-2.5 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition text-slate-200">
          @for (p of availableProviders(); track p) {
            <option [value]="p">{{ providerDisplayMap[p] || p }}</option>
          }
        </select>
      </div>
      <div>
        <h3 class="text-lg font-semibold text-purple-300 mb-2">AI Model</h3>
        <select
          [value]="model()"
          (change)="modelChange.emit($any($event.target).value)"
          class="w-full p-2.5 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition text-slate-200 font-mono">
          @for (m of availableModels(); track m) {
            <option [value]="m">{{ m }}</option>
          }
        </select>
      </div>
      <div>
        <h3 class="text-lg font-semibold text-purple-300 mb-2">API Configuration</h3>
        @if (hasEnvironmentKey()) {
          <p class="text-sm text-slate-400 bg-slate-700/50 p-3 rounded-lg flex items-center gap-2 h-[46px]">
            <i class="fa-solid fa-lock text-green-400"></i>
            <span>API Key is pre-configured.</span>
          </p>
        } @else {
          <div class="relative">
            <input 
              [type]="showApiKey() ? 'text' : 'password'"
              class="w-full p-2.5 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition pr-10"
              [placeholder]="'Enter ' + (providerDisplayMap[provider()] || provider()) + ' API Key'"
              [value]="apiKey()"
              (input)="apiKeyChange.emit($any($event.target).value)">
            <button (click)="toggleApiKeyVisibility()" class="absolute inset-y-0 right-0 px-3 flex items-center text-slate-400 hover:text-white">
              <i class="fa-solid" [class.fa-eye]="!showApiKey()" [class.fa-eye-slash]="showApiKey()"></i>
            </button>
          </div>
          <p class="text-xs text-slate-500 mt-2">Your key is stored locally in your browser.</p>
        }
      </div>
    </div>

    <!-- Divider -->
    <hr class="border-slate-700 my-8">

    <!-- Document Inputs -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <app-document-input
        title="Job Description"
        [idPrefix]="'jd'"
        [fileName]="jdFileName()"
        [textValue]="jdText()"
        (textValueChange)="jdTextChange.emit($event)"
        (fileChange)="handleFileChange($event, 'jd')"
        (clearFile)="clearFile.emit('jd')"
      ></app-document-input>

      <app-document-input
        title="Candidate CV"
        [idPrefix]="'cv'"
        [fileName]="cvFileName()"
        [textValue]="cvText()"
        (textValueChange)="cvTextChange.emit($event)"
        (fileChange)="handleFileChange($event, 'cv')"
        (clearFile)="clearFile.emit('cv')"
      ></app-document-input>
    </div>
    
    <!-- Action Buttons -->
    <div class="mt-8 border-t border-slate-700 pt-6">
      <div class="flex flex-wrap justify-center items-center gap-4">
        <button (click)="reset.emit()"
            class="bg-transparent hover:bg-slate-700 text-slate-300 font-bold hover:text-white py-3 px-8 border border-slate-600 rounded-lg text-lg transition">
            Reset
          </button>
          <button (click)="analyze.emit()" [disabled]="isAnalyzeDisabled()"
            class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-3 px-8 rounded-lg text-lg transition shadow-lg hover:shadow-purple-500/50">
            Run Analysis
          </button>
      </div>
    </div>
  </div>
</div>
