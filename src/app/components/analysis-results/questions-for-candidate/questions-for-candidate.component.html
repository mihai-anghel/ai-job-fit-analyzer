@if (result().questionsForCandidate && result().questionsForCandidate!.length > 0) {
  <div>
    <p class="text-sm text-teal-200/80 mb-4 print-atomic-item print-description">These are strategic questions the candidate could ask to better understand the role and company.</p>
    <ul class="space-y-3 list-decimal list-inside text-teal-200/90 print-list">
      @for (question of result().questionsForCandidate; track $index) {
        <li class="print-question-item">{{ question }}</li>
      }
    </ul>
  </div>
}
