<div class="mb-6 print-atomic-item">
  <app-info-list 
    [items]="jobInfoItems()" 
    [theme]="'job'"
    iconColorClass="text-slate-400">
  </app-info-list>
</div>

@if (companyDescription(); as description) {
  <p class="text-slate-300 leading-relaxed mb-6 print-atomic-item print-company-description">{{ description }}</p>
}

<hr class="border-slate-700 mb-6 print-atomic-item">
<ul class="space-y-2 list-disc list-inside text-slate-300 print-list">
  @for (item of result().jobSummary; track $index) {
    <li class="print-summary-item">{{ item }}</li>
  }
</ul>

<!-- JD Quality Analysis -->
@if (result().documentQualityAnalysis) {
  <div class="mt-6 pt-6 border-t border-slate-700 print-atomic-item">
    <h3 class="text-lg font-semibold text-slate-300 mb-4 print-sub-header">Job Description Quality</h3>
    <app-dimensional-analysis [items]="jdAnalysisItems()"></app-dimensional-analysis>
  </div>
}
